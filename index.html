<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Reports — PSD Framework</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 640px; margin: 80px auto; text-align: center; background: #f5f5f5; }
    h1 { color: #333; }
    p.sub { color: #888; font-size: 14px; margin-top: -8px; }
    .cards { display: flex; gap: 24px; justify-content: center; margin-top: 48px; }
    a.card { display: block; padding: 36px 48px; border-radius: 10px; text-decoration: none;
             font-size: 18px; font-weight: bold; color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .allure   { background: #e85a4f; }
    .cucumber { background: #23d96c; color: #1a4d2e; }
    a.card:hover { opacity: 0.88; transform: translateY(-2px); transition: all 0.15s; }
    .label { color: #666; font-size: 13px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>PSD Framework — Test Reports</h1>
  <p class="sub">Cucumber · Playwright · BDD</p>
  <div class="cards">
    <div>
      <a class="card allure" href="allure/index.html">Allure Report</a>
      <p class="label">History &amp; trend charts</p>
    </div>
    <div>
      <a class="card cucumber" href="cucumber/index.html">Cucumber Report</a>
      <p class="label">Scenarios &amp; step results</p>
    </div>
  </div>
</body>
</html>
